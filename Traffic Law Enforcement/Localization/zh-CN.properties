OptionLabel.EnableEstimatedRerouteLogging=Enable estimated reroute logging
OptionDesc.EnableEstimatedRerouteLogging=Debug-only. Writes only 'Pathfinding reroute (estimated)' logs. Turning this off disables reroute debug tracking and logging only; traffic-law detection, fines, repeat-offender logic, and pathfinding penalties still run.

OptionLabel.EnableEnforcementEventLogging=Enable enforcement event logging
OptionDesc.EnableEnforcementEventLogging=Debug-only. Writes traffic-law enforcement event logs\: PT-lane, mid-block, and intersection violation logs, fine-income collection logs, and bus-lane exit-pressure logs. Turning this off affects logging only; enforcement behavior and penalties still run.

OptionLabel.EnableType2PublicTransportLaneUsageLogging=Enable PT-lane usage logging for public vehicles denied to use PT lanes
OptionDesc.EnableType2PublicTransportLaneUsageLogging=Debug-only. Writes logs when Type 2 (PT-lane usage allowed in Vanilla, denied by this mod) vehicles are observed using PT-only lanes.

OptionLabel.EnableType3PublicTransportLaneUsageLogging=Enable PT-lane usage logging for non-public vehicles allowed to use PT lanes
OptionDesc.EnableType3PublicTransportLaneUsageLogging=Debug-only. Writes logs when Type 3 (PT-lane usage denied in Vanilla, allowed by this mod) vehicles are observed using PT-only lanes.

OptionLabel.EnableType4PublicTransportLaneUsageLogging=Enable PT-lane usage logging for non-public vehicles denied to use PT lanes
OptionDesc.EnableType4PublicTransportLaneUsageLogging=Debug-only. Writes logs when Type 4 (PT-lane usage denied in Vanilla, denied by this mod) vehicles are observed using PT-only lanes.

OptionLabel.EnablePathfindingPenaltyDiagnosticLogging=Enable pathfinding penalty diagnostic logging
OptionDesc.EnablePathfindingPenaltyDiagnosticLogging=Debug-only. Writes pathfinding money-axis penalty apply logs and shared PathfindCarData diagnostic logs. Turning this off affects logging only; pathfinding penalties still run.

OptionLabel.EnablePathObsoleteSourceLogging=Enable path obsolete source logging
OptionDesc.EnablePathObsoleteSourceLogging=Debug-only. Writes logs only when a system actually marks a vehicle PathOwner obsolete, including the source system and key reason data. Turning this off affects logging only; rerouting behavior still runs.

OptionLabel.ModLogPath=Mod log file path
OptionDesc.ModLogPath=Shows the full path to this mod's log file.

