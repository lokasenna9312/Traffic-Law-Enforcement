OptionLabel.AllowRoadPublicTransportVehicles=Road public transport vehicles
OptionDesc.AllowRoadPublicTransportVehicles=While this is on, road public transport vehicles are not fined by this mod for using public-transport-only lanes. Turning this off makes them subject to enforcement when using those lanes. Even then, vehicles actively performing emergency duties are still exempt from this mod's traffic-law fines.

