OptionLabel.MidBlockCrossingRepeatThreshold=Mid-block repeat-offender threshold
OptionDesc.MidBlockCrossingRepeatThreshold=How many mid-block crossing violations within the window are required before the repeat-offender penalty applies.
OptionLabel.MidBlockCrossingRepeatMultiplierPercent=Mid-block repeat-offender multiplier
OptionDesc.MidBlockCrossingRepeatMultiplierPercent=Multiplier applied to the mid-block crossing fine once the repeat-offender threshold is reached.

