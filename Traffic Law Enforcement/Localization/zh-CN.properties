OptionLabel.PublicTransportLaneExitPressureThresholdDays=Illegal PT-lane occupancy reroute threshold (days)
OptionDesc.PublicTransportLaneExitPressureThresholdDays=If a vehicle that is not allowed on public-transport-only lanes stays there for at least this many in-game days, mark its PathOwner obsolete to encourage a new route. 0 means apply as soon as possible after the violation starts.

OptionLabel.PublicTransportLaneFineAmount=PT-lane violation fine
