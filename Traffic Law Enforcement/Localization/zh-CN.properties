OptionLabel.EnablePublicTransportLaneRepeatPenalty=Enable repeat-offender penalty for PT-lane
OptionDesc.EnablePublicTransportLaneRepeatPenalty=Apply a higher fine to vehicles that repeatedly commit PT-lane violations.
OptionLabel.PublicTransportLaneRepeatWindowMonths=PT-lane repeat-offender window (in-game months)
OptionDesc.PublicTransportLaneRepeatWindowMonths=How long the same vehicle's PT-lane history is kept for repeat-offender counting. This uses in-game time, not real time. 12 in-game months equal 1 in-game year. On the vanilla time scale, 1 in-game month is roughly 1 in-game day. Mods that alter time progression can distort this window.
OptionLabel.PublicTransportLaneRepeatThreshold=PT-lane repeat-offender threshold
OptionDesc.PublicTransportLaneRepeatThreshold=How many PT-lane violations within the window are required before the repeat-offender penalty applies.
OptionLabel.PublicTransportLaneRepeatMultiplierPercent=PT-lane repeat-offender multiplier
OptionDesc.PublicTransportLaneRepeatMultiplierPercent=Multiplier applied to the PT-lane fine once the repeat-offender threshold is reached.

