OptionLabel.DefaultEnableMidBlockCrossingRepeatPenalty=중앙선 침범 상습 위반 가중처벌 사용
OptionDesc.DefaultEnableMidBlockCrossingRepeatPenalty=새로 만드는 세이브에 적용할 기본값입니다. 중앙선 침범을 반복한 차량에게 더 높은 벌금을 부과합니다.
OptionLabel.DefaultMidBlockCrossingRepeatWindowMonths=중앙선 침범 상습 위반 기준 기간 (게임 개월)
OptionDesc.DefaultMidBlockCrossingRepeatWindowMonths=새로 만드는 세이브에 적용할 기본값입니다. 같은 차량의 중앙선 침범을 상습 위반으로 볼 기간입니다. 실제 시간이 아니라 게임 내 시간을 사용합니다. 게임 12개월은 게임 1년입니다. 바닐라 기본 시간축에서는 게임 1개월이 게임 1일과 같습니다. 날짜 흐름을 바꾸는 모드는 기준 기간을 왜곡할 수 있습니다.
OptionLabel.DefaultMidBlockCrossingRepeatThreshold=중앙선 침범 상습 위반 기준 횟수
OptionDesc.DefaultMidBlockCrossingRepeatThreshold=새로 만드는 세이브에 적용할 기본값입니다. 기준 기간 안에 몇 번 이상 중앙선 침범을 해야 가중처벌을 적용할지 정합니다.
OptionLabel.DefaultMidBlockCrossingRepeatMultiplierPercent=중앙선 침범 가중처벌 배수
OptionDesc.DefaultMidBlockCrossingRepeatMultiplierPercent=새로 만드는 세이브에 적용할 기본값입니다. 상습 위반 기준에 도달했을 때 중앙선 침범 벌금에 적용할 배수입니다.

OptionLabel.DefaultEnableIntersectionMovementRepeatPenalty=교차로 통행규칙 위반 상습 위반 가중처벌 사용
