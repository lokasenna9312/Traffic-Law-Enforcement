OptionDesc.AllowParkMaintenanceVehicles=이 옵션이 켜져 있으면 공원 정비 차량이 대중교통 전용차선을 이용해도 이 모드의 단속을 받지 않습니다. 이 옵션을 끄면 그 차선을 이용할 때 단속 대상이 됩니다. 다만 일반 차선보다 대중교통 전용차선을 더 선호하도록 바뀌지는 않습니다.

OptionLabel.PublicTransportLaneExitPressureThresholdDays=불법 대중교통 전용차선 점유 재경로화 기준 시간 (일)
OptionDesc.PublicTransportLaneExitPressureThresholdDays=대중교통 전용차선 진입이 허용되지 않은 차량이 그 차선을 이 정도 게임 시간 이상 계속 점유하면 경로를 다시 찾도록 PathOwner를 obsolete 상태로 표시합니다.

OptionLabel.PublicTransportLaneFineAmount=대중교통 전용차선 위반 벌금
OptionDesc.PublicTransportLaneFineAmount=차량이 대중교통 전용차선을 불법으로 이용했을 때 부과할 벌금입니다.

OptionLabel.MidBlockCrossingFineAmount=중앙선 침범 벌금
OptionDesc.MidBlockCrossingFineAmount=유턴이나 진출입을 위해 중앙선을 불법으로 침범했을 때 부과할 벌금입니다.

OptionLabel.IntersectionMovementFineAmount=교차로 통행규칙 위반 벌금
OptionDesc.IntersectionMovementFineAmount=차량이 자기 차선에서 허용되지 않은 방식으로 교차로를 통과했을 때 부과할 벌금입니다.

OptionLabel.ResetCurrentSaveSettingsToCodeDefaults=현재 세이브 설정을 코드 기본값으로 복원
OptionDesc.ResetCurrentSaveSettingsToCodeDefaults=현재 세이브의 게임플레이 규칙을 이 모드의 내장 코드 기본값으로 되돌립니다.

OptionLabel.CopyCurrentSaveSettingsToDefaults=현재 세이브 값을 기본값으로 복사
OptionDesc.CopyCurrentSaveSettingsToDefaults=현재 세이브의 게임플레이 규칙을 새 세이브 기본값 템플릿으로 복사합니다.

OptionLabel.ResetDefaultsToCodeDefaults=기본값을 코드 기본값으로 초기화
OptionDesc.ResetDefaultsToCodeDefaults=새 세이브 기본값 템플릿을 이 모드의 내장 기본값으로 되돌립니다.

OptionLabel.EnableEstimatedRerouteLogging=추정 우회 경로 로그 기록
OptionDesc.EnableEstimatedRerouteLogging=디버그 전용입니다. 교통법규 위반 단속을 피하기 위해 경로를 수정한 교통량의 로그를 기록합니다.

OptionLabel.EnableEnforcementEventLogging=교통법규 단속 이벤트 로그 기록
OptionDesc.EnableEnforcementEventLogging=디버그 전용입니다. 대중교통 전용차선, 중앙선 침범, 교차로 통행규칙 위반 로그와 벌금 수익 징수 로그를 기록합니다.

OptionLabel.EnableType2PublicTransportLaneUsageLogging=대중교통 전용차선 이용이 불허된 대중교통 차량의 대중교통 전용차선 사용 로그 기록
OptionDesc.EnableType2PublicTransportLaneUsageLogging=디버그 전용입니다. Type 2 (대중교통 전용차선 이용이 바닐라에서는 허가되고 이 모드에서는 불허된) 차량의 실제 대중교통 전용차선 사용 로그를 기록합니다.

OptionLabel.EnableType3PublicTransportLaneUsageLogging=대중교통 전용차선 이용이 허가된 비대중교통 차량의 대중교통 전용차선 사용 로그 기록
OptionDesc.EnableType3PublicTransportLaneUsageLogging=디버그 전용입니다. Type 3 (대중교통 전용차선 이용이 바닐라에서는 불허되고 이 모드에서는 허가된) 차량의 실제 대중교통 전용차선 사용 로그를 기록합니다.

OptionLabel.EnableType4PublicTransportLaneUsageLogging=대중교통 전용차선 이용이 불허된 비대중교통 차량의 대중교통 전용차선 사용 로그 기록
OptionDesc.EnableType4PublicTransportLaneUsageLogging=디버그 전용입니다. Type 4 (대중교통 전용차선 이용이 바닐라에서도 불허되고 이 모드에서도 불허된) 차량의 실제 대중교통 전용차선 사용 로그를 기록합니다.

OptionLabel.EnablePathfindingPenaltyDiagnosticLogging=경로탐색 페널티 진단 로그 기록
OptionDesc.EnablePathfindingPenaltyDiagnosticLogging=디버그 전용입니다. 경로탐색 페널티 관련 진단 로그를 기록합니다.

OptionLabel.EnablePathObsoleteSourceLogging=경로 obsolete 원인 로그 기록
OptionDesc.EnablePathObsoleteSourceLogging=디버그 전용입니다. 어떤 시스템이 PathOwner를 obsolete 상태로 만들었는지 기록합니다.

OptionLabel.EnableSaveIdentificationLogging=세이브 식별 로그 기록
OptionDesc.EnableSaveIdentificationLogging=디버그 전용입니다. GameManager.Load가 실제로 어떤 세이브 슬롯을 이 모드에 넘겼는지, 그리고 로드한 세이브에 이 모드의 직렬화 저장 데이터 블록이 포함되어 있는지를 기록합니다. 이 옵션을 꺼도 저장/불러오기 동작 자체는 바뀌지 않습니다.

OptionLabel.EnableAllVehicleRouteSelectionChangeLogging=전차량 경로 선택 변화 로그 기록
OptionDesc.EnableAllVehicleRouteSelectionChangeLogging=디버그 전용입니다. 도로 차량의 현재 경로 선택 상태가 바뀔 때 route hash, 현재 경로, 타깃, path state, reroute 이벤트를 change-driven 방식으로 기록합니다. 이 옵션을 꺼도 차량 경로탐색 동작 자체는 바뀌지 않습니다.

OptionLabel.EnableFocusedVehicleOnlyRouteLogging=감시 차량만 경로 디버그 로그 기록
OptionDesc.EnableFocusedVehicleOnlyRouteLogging=디버그 전용입니다. 차량별 경로 디버그 로그를 Focused logging에서 현재 감시 중인 차량에 대해서만 기록합니다. estimated reroute, route-selection change, PT-route diagnostics, 차량 문맥이 있는 path obsolete source 로그에 적용되며, 차량 문맥이 없는 로그는 그대로 유지됩니다.

OptionLabel.SelectedObjectPanelToggleBinding=Selected Object 패널 토글
OptionDesc.SelectedObjectPanelToggleBinding=Selected Object 인게임 패널을 표시하거나 숨깁니다. 기본 바인딩은 Ctrl + Shift + I 입니다.
