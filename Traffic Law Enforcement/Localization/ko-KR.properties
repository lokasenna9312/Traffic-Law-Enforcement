OptionDesc.EnablePublicTransportLaneEnforcement=대중교통 전용차선 위반 감지, 벌금 부과, 대중교통 전용차선 경로탐색 페널티를 켜거나 끕니다.

OptionLabel.EnableMidBlockCrossingEnforcement=중앙선 침범 단속 활성화
OptionDesc.EnableMidBlockCrossingEnforcement=유턴 및 진출입 관련 중앙선 침범 위반 감지, 벌금 부과, 경로탐색 페널티를 켜거나 끕니다.

OptionLabel.EnableIntersectionMovementEnforcement=교차로 통행규칙 단속 활성화
OptionDesc.EnableIntersectionMovementEnforcement=교차로 통행규칙 위반 감지, 벌금 부과, 경로탐색 페널티를 켜거나 끕니다.

OptionLabel.AllowRoadPublicTransportVehicles=도로 대중교통 차량
OptionDesc.AllowRoadPublicTransportVehicles=이 옵션이 켜져 있으면 도로 대중교통 차량이 대중교통 전용차선을 이용해도 이 모드의 단속을 받지 않습니다. 이 옵션을 끄면 그 차선을 이용할 때 단속 대상이 됩니다. 그래도 긴급 임무 수행 중에는 이 모드의 교통법규 위반 단속을 받지 않습니다.

OptionLabel.AllowTaxis=택시
OptionDesc.AllowTaxis=이 옵션이 켜져 있으면 택시가 대중교통 전용차선을 이용해도 이 모드의 단속을 받지 않습니다. 이 옵션을 끄면 그 차선을 이용할 때 단속 대상이 됩니다.

