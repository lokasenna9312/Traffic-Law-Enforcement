OptionLabel.AllowPrisonerTransports=죄수 호송차
OptionDesc.AllowPrisonerTransports=이 옵션이 켜져 있으면 죄수 호송차가 대중교통 전용차선을 이용해도 이 모드의 단속을 받지 않습니다. 이 옵션을 끄면 그 차선을 이용할 때 단속 대상이 됩니다. 다만 일반 차선보다 대중교통 전용차선을 더 선호하도록 바뀌지는 않습니다.

