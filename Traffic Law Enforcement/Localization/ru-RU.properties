OptionLabel.CopyCurrentSaveSettingsToDefaults=Copy current save settings to defaults
OptionDesc.CopyCurrentSaveSettingsToDefaults=Copy the current save's gameplay rules into the new-save defaults template.

OptionLabel.ResetDefaultsToCodeDefaults=Reset defaults to code defaults
OptionDesc.ResetDefaultsToCodeDefaults=Reset the new-save defaults template to this mod's built-in code defaults.

OptionLabel.EnableEstimatedRerouteLogging=Enable estimated reroute logging
OptionDesc.EnableEstimatedRerouteLogging=Debug-only. Writes only 'Pathfinding reroute (estimated)' logs. Turning this off disables reroute debug tracking and logging only; traffic-law detection, fines, repeat-offender logic, and pathfinding penalties still run.

OptionLabel.EnableEnforcementEventLogging=Enable vehicle enforcement event logging
OptionDesc.EnableEnforcementEventLogging=Debug-only. Writes vehicle-specific traffic-law enforcement event logs: PT-lane, mid-block, and intersection violation logs, plus bus-lane exit-pressure logs. Turning this off affects logging only; enforcement behavior and penalties still run.
OptionLabel.EnablePolicyImpactSummaryLogging=Enable policy impact summary logging
OptionDesc.EnablePolicyImpactSummaryLogging=Debug-only. Writes throttled aggregate enforcement summary logs for route, violation, and avoidance totals. Turning this off affects logging only; policy-impact tracking and statistics still run.
OptionLabel.EnableFineIncomeLogging=Enable fine income summary logging
OptionDesc.EnableFineIncomeLogging=Debug-only. Writes throttled aggregate fine-income summary logs. Turning this off affects logging only; fine collection, accounting, and UI totals still run.
OptionLabel.EnableChirperLifecycleLogging=Enable chirper lifecycle logging
OptionDesc.EnableChirperLifecycleLogging=Debug-only. Writes monthly Chirper, month-boundary, and report-generation lifecycle logs. Turning this off affects logging only; Chirper reports and persistence behavior still run.

OptionLabel.EnableType2PublicTransportLaneUsageLogging=Enable PT-lane usage logging for public vehicles denied to use PT lanes
OptionDesc.EnableType2PublicTransportLaneUsageLogging=Debug-only. Writes logs when Type 2 (PT-lane usage allowed in Vanilla, denied by this mod) vehicles using PT-only lanes are observed.

OptionLabel.EnableType3PublicTransportLaneUsageLogging=Enable PT-lane usage logging for non-public vehicles allowed to use PT lanes
OptionDesc.EnableType3PublicTransportLaneUsageLogging=Debug-only. Writes logs when Type 3 (PT-lane usage denied in Vanilla, allowed by this mod) vehicles using PT-only lanes are observed.

OptionLabel.EnableType4PublicTransportLaneUsageLogging=Enable PT-lane usage logging for non-public vehicles denied to use PT lanes
OptionDesc.EnableType4PublicTransportLaneUsageLogging=Debug-only. Writes logs when Type 4 (PT-lane usage denied in Vanilla, denied by this mod) vehicles using PT-only lanes are observed.

OptionLabel.EnablePathfindingPenaltyDiagnosticLogging=Enable pathfinding penalty diagnostic logging
OptionDesc.EnablePathfindingPenaltyDiagnosticLogging=Debug-only. Writes pathfinding money-axis penalty apply logs and shared PathfindCarData diagnostic logs. Turning this off affects logging only; pathfinding penalties still run.

OptionLabel.EnablePathObsoleteSourceLogging=Enable path obsolete source logging
OptionDesc.EnablePathObsoleteSourceLogging=Debug-only. Writes automatic path-obsolete source logs when a system marks a vehicle PathOwner obsolete, including the source system and key reason data. Manual Mark path obsolete actions from the Selected Object panel are always logged. Turning this off affects logging only; rerouting behavior still runs.

OptionLabel.EnableAllVehicleRouteSelectionChangeLogging=Enable route-selection change summary logging
OptionDesc.EnableAllVehicleRouteSelectionChangeLogging=Debug-only. Writes one-line change-driven summary logs for road vehicles when current route-selection state changes, including route hash, current route, target, path state, and reroute events. If Restrict vehicle-specific debug logs to watched vehicles is disabled, this can log many vehicles. If that restriction is enabled, the same summary is limited to watched vehicles. Turning this off affects logging only; vehicle pathfinding behavior is unchanged.

OptionLabel.EnableFocusedRouteRebuildDiagnosticsLogging=Enable focused route rebuild diagnostics
OptionDesc.EnableFocusedRouteRebuildDiagnosticsLogging=Debug-only. For watched vehicles in Focused logging, writes deep-dive route rebuild diagnostics when route-selection state changes, including rebuild context, chosen transitions, lane-name resolution, and related route state. Turning this off affects logging only; vehicle pathfinding behavior is unchanged.

OptionLabel.EnableFocusedVehicleOnlyRouteLogging=Restrict vehicle-specific debug logs to watched vehicles
OptionDesc.EnableFocusedVehicleOnlyRouteLogging=Debug-only. For enabled vehicle-specific logs, only records vehicles currently watched in Focused logging. This affects route-selection change summary logs, estimated reroute logs, PT-route diagnostics, vehicle-context path obsolete source logs, vehicle-specific enforcement events, PT-lane usage logs, PT-lane exit-pressure logs, and CENTERLINE invalidation logs. Global/state logs are unchanged.


