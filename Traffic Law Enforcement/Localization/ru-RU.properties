OptionDesc.DefaultAllowParkMaintenanceVehicles=Default value for newly created saves. While this is on, park maintenance vehicles are not fined by this mod for using public-transport-only lanes. Turning this off makes them subject to enforcement when using those lanes. They still do not prefer PT lanes over ordinary lanes.

OptionLabel.DefaultPublicTransportLaneExitPressureThresholdDays=Illegal PT-lane occupancy reroute threshold (days)
OptionDesc.DefaultPublicTransportLaneExitPressureThresholdDays=Default value for newly created saves. If a vehicle that is not allowed on public-transport-only lanes stays there for at least this many in-game days, mark its PathOwner obsolete to encourage a new route. 0 means apply as soon as possible after the violation starts.
OptionLabel.DefaultPublicTransportLaneFineAmount=PT-lane violation fine
OptionDesc.DefaultPublicTransportLaneFineAmount=Default value for newly created saves. Fine amount charged when a vehicle illegally uses a public-transport-only lane.
OptionLabel.DefaultMidBlockCrossingFineAmount=Mid-block crossing fine
OptionDesc.DefaultMidBlockCrossingFineAmount=Default value for newly created saves. Fine amount charged for mid-block U-turns and illegal centerline crossings for access.
OptionLabel.DefaultIntersectionMovementFineAmount=Intersection movement fine
OptionDesc.DefaultIntersectionMovementFineAmount=Default value for newly created saves. Fine amount charged when a vehicle crosses an intersection with a maneuver not allowed from its lane.

OptionLabel.EnablePublicTransportLaneRepeatPenalty=Enable repeat-offender penalty for PT-lane
OptionDesc.EnablePublicTransportLaneRepeatPenalty=Apply a higher fine to vehicles that repeatedly commit PT-lane violations.
OptionLabel.PublicTransportLaneRepeatWindowMonths=PT-lane repeat-offender window (in-game months)
OptionDesc.PublicTransportLaneRepeatWindowMonths=How long the same vehicle's PT-lane history is kept for repeat-offender counting. This uses in-game time, not real time. 12 in-game months equal 1 in-game year. On the vanilla time scale, 1 in-game month is roughly 1 in-game day. Mods that alter time progression can distort this window.
OptionLabel.PublicTransportLaneRepeatThreshold=PT-lane repeat-offender threshold
OptionDesc.PublicTransportLaneRepeatThreshold=How many PT-lane violations within the window are required before the repeat-offender penalty applies.
OptionLabel.PublicTransportLaneRepeatMultiplierPercent=PT-lane repeat-offender multiplier
OptionDesc.PublicTransportLaneRepeatMultiplierPercent=Multiplier applied to the PT-lane fine once the repeat-offender threshold is reached.

