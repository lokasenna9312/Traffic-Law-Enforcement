OptionLabel.PublicTransportLaneExitPressureThresholdDays=Illegal PT-lane occupancy reroute threshold (days)
OptionDesc.PublicTransportLaneExitPressureThresholdDays=If a vehicle that is not allowed on public-transport-only lanes stays there for at least this many in-game days, mark its PathOwner obsolete to encourage a new route. 0 means apply as soon as possible after the violation starts.

OptionLabel.PublicTransportLaneFineAmount=PT-lane violation fine
OptionDesc.PublicTransportLaneFineAmount=Fine amount charged when a vehicle illegally uses a public-transport-only lane.

OptionLabel.MidBlockCrossingFineAmount=Mid-block crossing fine
OptionDesc.MidBlockCrossingFineAmount=Fine amount charged for mid-block U-turns and illegal centerline crossings for access.

OptionLabel.IntersectionMovementFineAmount=Intersection movement fine
OptionDesc.IntersectionMovementFineAmount=Fine amount charged when a vehicle crosses an intersection with a maneuver not allowed from its lane.

