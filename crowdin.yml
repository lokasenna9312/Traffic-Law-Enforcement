project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: .
preserve_hierarchy: true

files:
  - source: /Traffic Law Enforcement/Localization/en-US.properties
    translation: /Traffic Law Enforcement/Localization/%locale%.properties
    export_only_approved: true
    skip_untranslated_strings: true
    type: properties
    languages_mapping:
      locale:
        es-ES: es-ES
        de: de-DE
        fr: fr-FR
        it: it-IT
        ja: ja-JP
        ko: ko-KR
        pl: pl-PL
        ru: ru-RU
        pt-BR: pt-BR
        zh-CN: zh-CN
        zh-TW: zh-TW
